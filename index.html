<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f1f3f6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container{
    width:750px;
    height:420px;
    display:flex;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.left{
    width:40%;
    background:#2874f0;
    color:white;
    padding:40px 30px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#fff;
    color:#2874f0;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    font-weight:bold;
    margin-bottom:20px;
}

.left h2{
    margin-bottom:10px;
}

.left p{
    text-align:center;
    line-height:24px;
    opacity:.9;
}

.right{
    width:60%;
    padding:50px;
}

.right h2{
    margin-bottom:30px;
    color:#333;
}

.input-box{
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    border-bottom:2px solid #ccc;
    outline:none;
    font-size:16px;
    transition:.3s;
}

.input-box input:focus{
    border-color:#2874f0;
}

button{
    width:100%;
    padding:14px;
    background:#fb641b;
    color:white;
    border:none;
    border-radius:5px;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#ff7b39;
}

.links{
    margin-top:20px;
    text-align:center;
}

.links a{
    text-decoration:none;
    color:#2874f0;
    font-size:14px;
}

.signup{
    margin-top:40px;
    text-align:center;
}

.signup a{
    color:#2874f0;
    text-decoration:none;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="login-container">

    <div class="left">
        <div class="logo">S</div>
        <h2>ShopEasy</h2>
        <p>
            Welcome Back!<br>
            Login to access your shopping account,
            orders, wishlist, and exclusive offers.
        </p>
    </div>

    <div class="right">
        <h2>Login</h2>

        <form>
            <div class="input-box">
                <input type="text" placeholder="Username or Email" required>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Password" required>
            </div>

            <button type="submit">Login</button>

            <div class="links">
                <a href="#">Forgot Password?</a>
            </div>

            <div class="signup">
                New User?
                <a href="#">Create an account</a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
