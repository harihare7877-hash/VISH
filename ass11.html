<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#232f3e,#131921);
}

.container{
    width:380px;
}

.logo{
    text-align:center;
    color:#ff9900;
    font-size:42px;
    font-weight:700;
    margin-bottom:20px;
}

.card{
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.card h2{
    margin-bottom:25px;
    color:#222;
}

.input-box{
    margin-bottom:18px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:600;
}

.input-box input{
    width:100%;
    padding:14px;
    border:1px solid #bbb;
    border-radius:8px;
    outline:none;
    font-size:15px;
    transition:.3s;
}

.input-box input:focus{
    border-color:#ff9900;
    box-shadow:0 0 10px rgba(255,153,0,.4);
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#ff9900;
    color:#111;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:#ffb84d;
    transform:translateY(-2px);
}

.links{
    display:flex;
    justify-content:space-between;
    margin-top:18px;
    font-size:14px;
}

.links a{
    color:#0066c0;
    text-decoration:none;
}

.links a:hover{
    text-decoration:underline;
}

.divider{
    text-align:center;
    margin:25px 0;
    color:#777;
    position:relative;
}

.divider::before,
.divider::after{
    content:"";
    position:absolute;
    top:50%;
    width:40%;
    height:1px;
    background:#ddd;
}

.divider::before{
    left:0;
}

.divider::after{
    right:0;
}

.create-btn{
    width:100%;
    padding:13px;
    border:1px solid #bbb;
    background:#f7f7f7;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

.create-btn:hover{
    background:#ececec;
}

.footer{
    margin-top:25px;
    text-align:center;
    color:#ccc;
    font-size:13px;
}

@media(max-width:420px){

.container{
    width:92%;
}

.card{
    padding:28px;
}

}
</style>

</head>
<body>

<div class="container">

<div class="logo">
ShopZone
</div>

<div class="card">

<h2>Sign In</h2>

<form>

<div class="input-box">
<label>Email or Mobile Number</label>
<input type="text" placeholder="Enter your email">
</div>

<div class="input-box">
<label>Password</label>
<input type="password" placeholder="Enter password">
</div>

<button class="btn">
Sign In
</button>

</form>

<div class="links">
<a href="#">Forgot Password?</a>
<a href="#">Need Help?</a>
</div>

<div class="divider">
New here?
</div>

<button class="create-btn">
Create Your Account
</button>

</div>

<div class="footer">
© 2026 ShopZone. All rights reserved.
</div>

</div>

</body>
</html>
